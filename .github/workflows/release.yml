# Release workflow
#
# Triggered when a GitHub Release is published. The create_draft_release
# workflow keeps the draft up to date; a human publishes it when ready.

---
name: Release

concurrency: changelog

on:
  release:
    types: [released]

permissions:
  contents: read

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    outputs:
      branch: ${{ steps.release.outputs.branch }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.target_commitish }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with: { python-version: "3.14" }

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Sync dependencies
        run: uv sync --frozen --group dev

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump, commit, push branch and open PR
        id: release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ github.event.release.tag_name }}
          RELEASE_ID: ${{ github.event.release.id }}
          BASE_BRANCH: ${{ github.event.release.target_commitish }}
          REPO: ${{ github.repository }}
        run: |
          # One command does everything the bump job used to do in shell:
          # bump changelog + version files, branch, [skip ci] commit,
          # --force-with-lease push, and open the release PR. The [skip ci]
          # decision follows [defaults].skip_ci (default true).
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"
          VERSION="${RELEASE_VERSION#v}"
          # --json is a global flag, so it must precede the `release-bump`
          # subcommand (argparse rejects it if placed after).
          uv run kaclm --json release-bump \
            --version "$VERSION" \
            --base "$BASE_BRANCH" \
            --release-id "$RELEASE_ID" \
            --repository "$REPO" \
            --open-pr \
            --title "chore: release ${VERSION}" \
            --body "Automated release PR for ${VERSION}. Merge once the PyPI publish succeeds." \
            --yes > release-bump.json
          echo "version=$(python -c "import json;print(json.load(open('release-bump.json'))['version'])")" >> "$GITHUB_OUTPUT"
          echo "branch=$(python -c "import json;print(json.load(open('release-bump.json'))['branch'])")" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: bump

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.bump.outputs.branch }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with: { python-version: "3.14" }

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Build
        run: uv build --no-sources

      - name: Verify dist version matches release
        env:
          EXPECTED: ${{ needs.bump.outputs.version }}
        run: |
          WHEEL=$(ls dist/*.whl 2>/dev/null | head -1)
          if [ -z "$WHEEL" ]; then
            echo "::error::No wheel found in dist/"
            exit 1
          fi
          if ! echo "$WHEEL" | grep -q "${EXPECTED}"; then
            echo "::error::Wheel ${WHEEL} does not contain expected version ${EXPECTED}"
            exit 1
          fi
          echo "Verified: ${WHEEL} matches version ${EXPECTED}"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packages
          path: dist/
          if-no-files-found: error
          retention-days: 1

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/git-mirror

    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packages
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          verbose: "true"
