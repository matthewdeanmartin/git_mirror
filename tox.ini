[tox]
envlist =
    py39
    py310
    py311
    py312
    py313
    py314

[testenv]
deps =
    pytest>=7.4.3
    pytest-cov>=4.1.0
    pytest-xdist>=3.5.0
    pytest-mock>=3.14.0
    hypothesis>=6.96.0
passenv =
    OS
setenv =
    PYTEST_BASETEMP = {toxworkdir}{/}tmp_pytest{/}{envname}
commands =
    python -m pytest --basetemp={env:PYTEST_BASETEMP} tests/tests_human/test_cli_smoke.py -q
    python -m pytest --basetemp={env:PYTEST_BASETEMP} --doctest-modules git_mirror -n 2
    python -m pytest --basetemp={env:PYTEST_BASETEMP} tests -vv -n 2 --cov=git_mirror --cov-report=term-missing --cov-fail-under 50
